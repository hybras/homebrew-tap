name: brew bump kdeconnect@nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '7 7 * * *'

jobs:
  bump-formula:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        id: set-up-homebrew
      - name: Configure git
        uses: Homebrew/actions/git-user-config@main
        with:
          username: ${{ (github.event_name == 'workflow_dispatch' && github.actor) || 'BrewTestBot' }}
      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-
      - name: Install Homebrew Bundler RubyGems
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install-bundler-gems
      - name: Tap hybras/tap
        run: brew tap hybras/tap
      - name: Bump Formula
        uses: Homebrew/actions/bump-packages@master
        with:
          token: ${{ secrets.PAT_GITHUB }}
          casks: 'kdeconnect@nightly'
      - name: Find PR number
        id: find-pr
        run: |
          PR_NUMBER=$(gh pr list --search "kdeconnect@nightly" --state open --limit 1 --json number --jq '.[0].number' 2>/dev/null || echo "")
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge PR
        if: steps.find-pr.outputs.pr_number != ''
        run: |
          gh pr merge --auto --rebase "${{ steps.find-pr.outputs.pr_number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
